version: 2.1

orbs:
  architect: giantswarm/architect@8.2.1

workflows:
  build:
    jobs:
    - architect/go-build:
        matrix:
          parameters:
            architecture: ["linux/amd64", "linux/arm64"]
        name: go-build-capa-karpenter-taint-remover-<<matrix.architecture>>
        context: architect
        binary: capa-karpenter-taint-remover
        filters:
          tags:
            only: /^v.*/

    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        multiarch: true
        requires:
        - go-build-capa-karpenter-taint-remover-linux/amd64
        - go-build-capa-karpenter-taint-remover-linux/arm64
        filters:
          tags:
            only: /^v.*/

          branches:
            ignore:
            - main
            - master
    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: push-capa-karpenter-taint-remover-to-app-catalog
        app_catalog: default-catalog
        app_catalog_test: default-test-catalog
        chart: capa-karpenter-taint-remover
        requires:
        - push-to-registries
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master
